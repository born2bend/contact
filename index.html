<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | IT Analyst</title>
<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0f0f12;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .card {
        text-align: center;
        padding: 40px;
        border-radius: 16px;
        background: #18181c;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
        max-width: 400px;
        width: 90%;
    }

    h1 {
        margin: 0 0 10px;
        font-size: 32px;
        font-weight: 600;
    }

    h2 {
        margin: 0 0 30px;
        font-size: 18px;
        font-weight: 400;
        color: #9ca3af;
    }

    .btn {
        display: inline-block;
        margin: 10px 0;
        padding: 12px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 16px;
        font-weight: 500;
        transition: 0.2s ease;
        background-color: #2563eb;
        color: #ffffff;
    }

    .btn:hover {
        background-color: #1e40af;
        transform: translateY(-2px);
    }

    footer {
        margin-top: 30px;
        font-size: 12px;
        color: #6b7280;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Oleg N.</h1>
    <h2>IT Analyst</h2>

    <a class="btn" href="mailto:contact@oknaumov.com">Email Me</a>

    <footer>
        2026
    </footer>
</div>

</body>

</html>
